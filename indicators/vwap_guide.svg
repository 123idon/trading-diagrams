<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" font-family="sans-serif">
  <rect width="400" height="260" fill="#f7f5ef"/>
  <text x="200.0" y="24" text-anchor="middle" font-size="15" font-weight="700" fill="#1c1b18">VWAP 지지/저항 활용</text>
  
  <!-- VWAP 선 -->
  <line x1="40" y1="140" x2="360" y2="105" stroke="#e0a020" stroke-width="2.5"/>
  <text x="300" y="98" font-size="11" fill="#c8901a" font-weight="600">VWAP</text>
  <!-- 가격: VWAP 위에서 눌림 후 지지 반등 -->
  <polyline points="45,150 75,120 105,100 135,118 160,128 180,118 210,95 240,80 275,90 310,70 350,55" fill="none" stroke="#1c1b18" stroke-width="2"/>
  <!-- 지지 지점 표시 -->
  <circle cx="160" cy="128" r="5" fill="none" stroke="#2e8b57" stroke-width="2"/>
  <text x="120" y="165" font-size="10" fill="#2e8b57" font-weight="600">VWAP 지지 반등</text>
  <text x="120" y="178" font-size="9" fill="#666">= 매수 타점</text>
  <text x="30" y="55" font-size="10" fill="#666">가격 &gt; VWAP</text>
  <text x="30" y="68" font-size="10" fill="#c0392b" font-weight="600">= 매수 우위 환경</text>
  <text x="200" y="240" text-anchor="middle" font-size="11" fill="#666">VWAP 위 = 오늘 평균 매수자 수익권 → 눌림목 VWAP 지지 노림</text>

</svg>